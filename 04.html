<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😍반응형 홈페이지지😍</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        table { border-collapse: collapse;}  
        .colLine {
            line-height:200%;
            min-height:30px;
            border-bottom:1px dotted #333333;
            padding-top:5px;
            padding-bottom:5px;
        } 
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col colLine">a</div>
            <div class="col colLine">b</div>
            <div class="col colLine">c</div>
        </div>
        <div class="row">
            <div class="col-1 colLine bg-primary">a</div>
            <div class="col-3 colLine bg-danger">b</div>
            <div class="col colLine bg-success">c</div>
        </div>
    </div>
</body>
</html>
